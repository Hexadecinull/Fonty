name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-electron:
    name: Electron (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            flag: --win
            artifact: fonty-windows
            path: desktop/dist/*.exe

          - os: ubuntu-latest
            flag: --linux
            artifact: fonty-linux
            path: |
              desktop/dist/*.AppImage
              desktop/dist/*.deb

          - os: macos-latest
            flag: --mac
            artifact: fonty-macos
            path: desktop/dist/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          # libfuse2 was renamed to libfuse2t64 on Ubuntu 24.04
          sudo apt-get install -y libfuse2t64 2>/dev/null || sudo apt-get install -y libfuse2
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 xvfb

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build
        working-directory: desktop
        run: npm run build ${{ matrix.flag }}
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
          retention-days: 14

  build-android:
    name: Android (debug APK)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Install Capacitor dependencies
        working-directory: android
        run: npm install

      - name: Prepare web assets
        run: node android/prepare-web.js

      - name: Sync Capacitor
        working-directory: android
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android
          node gradle-fix.js

      - name: Build debug APK
        working-directory: android/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: fonty-android-debug
          path: android/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

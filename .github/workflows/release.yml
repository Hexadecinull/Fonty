name: Release

# Push a version tag to trigger, e.g.:
#   git tag v2.1.0 && git push origin v2.1.0
#
# Tags with a hyphen (v2.1.0-beta.1) are marked as pre-releases.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-electron:
    name: Release Electron (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            flag: --win
          - os: ubuntu-latest
            flag: --linux
          - os: macos-latest
            flag: --mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package.json

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libfuse2t64 2>/dev/null || sudo apt-get install -y libfuse2
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 xvfb

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build
        working-directory: desktop
        run: npm run build ${{ matrix.flag }}
        env:
          CI: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # macOS code signing - add these secrets to enable:
      # APPLE_CERTIFICATE, APPLE_CERTIFICATE_PWD, APPLE_ID, APPLE_ID_PWD, APPLE_TEAM_ID

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Fonty ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            desktop/dist/*.exe
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-android:
    name: Release Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Install Capacitor
        working-directory: android
        run: npm ci

      - name: Prepare web assets
        run: |
          mkdir -p android/www/lib
          cp index.html app.js app.css android/www/
          cp lib/fonty.js android/www/lib/

      - name: Add Android platform and sync
        working-directory: android
        run: |
          npx cap add android
          npx cap sync

      - name: Build release APK
        working-directory: android/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Publish Android APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Fonty ${{ github.ref_name }}"
          files: android/android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
